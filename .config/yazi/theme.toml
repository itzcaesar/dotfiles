# Matugen template: yazi file manager theme from wallpaper

[mode]
normal_main = { fg = "#0c390e", bg = "#a2d399", bold = true }
normal_alt  = { fg = "#e0e4da", bg = "reset" }
select_main = { fg = "#bdf0b3", bg = "#255023", bold = true }
select_alt  = { fg = "#bdf0b3", bg = "#255023" }
unset_main  = { fg = "#c2c8bd", bg = "reset" }
unset_alt   = { fg = "#c2c8bd", bg = "reset" }

[status]
overall = { fg = "reset", bg = "reset" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_type  = { fg = "#a2d399", bold = true }
perm_read  = { fg = "#a0cfd4" }
perm_write = { fg = "#baccb3" }
perm_exec  = { fg = "#ffb4ab" }
perm_sep   = { fg = "#8c9388" }

progress_label  = { fg = "#e0e4da", bold = true }
progress_normal = { fg = "#a2d399", bg = "reset" }
progress_error  = { fg = "#ffb4ab", bg = "reset" }

[mgr]
cwd = { fg = "#a0cfd4", bold = true }

find_keyword  = { fg = "#a0cfd4", bold = true, italic = true, underline = true }
find_position = { fg = "#baccb3", bg = "reset", bold = true, italic = true }

marker_copied   = { fg = "#a2d399", bg = "#a2d399" }
marker_cut      = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_marked   = { fg = "#baccb3", bg = "#baccb3" }
marker_selected = { fg = "#a0cfd4", bg = "#a0cfd4" }

count_copied   = { fg = "#0c390e", bg = "#a2d399" }
count_cut      = { fg = "#690005", bg = "#ffb4ab" }
count_selected = { fg = "#00363b", bg = "#a0cfd4" }

border_symbol = "│"
border_style  = { fg = "#8c9388" }

hovered = { bg = "#323630" }

[indicator]
parent  = { fg = "#baccb3", bold = true }
current = { fg = "#a2d399", bold = true }
preview = { fg = "#8c9388", bold = true }
padding = { open = "", close = " " }

[tabs]
active   = { fg = "#0c390e", bg = "#a2d399" }
inactive = { fg = "#e0e4da", bg = "#1d211b" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[input]
border   = { fg = "#a2d399" }
title    = { fg = "#a2d399" }
value    = { fg = "#e0e4da" }
selected = { reversed = true }

[pick]
border   = { fg = "#a2d399" }
active   = { fg = "#0c390e", bg = "#a2d399" }
inactive = { fg = "#e0e4da" }

[confirm]
border = { fg = "#a2d399" }
title  = { fg = "#a2d399" }
body   = { fg = "#e0e4da" }
list   = { fg = "#e0e4da" }
btn_yes = { fg = "#0c390e", bg = "#a2d399" }
btn_no  = { fg = "#690005", bg = "#ffb4ab" }
btn_labels = [ " Yes ", " No " ]

[notify]
title_info  = { fg = "#a2d399" }
title_warn  = { fg = "#a0cfd4" }
title_error = { fg = "#ffb4ab" }

[help]
on     = { fg = "#a2d399" }
run    = { fg = "#baccb3" }
desc   = { fg = "#e0e4da" }
hovered = { reversed = true }
footer  = { fg = "#8c9388" }

[which]
cols = 3
mask = { bg = "#1d211b" }
cand = { fg = "#a2d399" }
rest = { fg = "#8c9388" }
desc = { fg = "#e0e4da" }
separator = " → "
separator_style = { fg = "#8c9388" }

[tasks]
border  = { fg = "#a2d399" }
title   = { fg = "#a2d399" }
hovered = { reversed = true }

[filetype]
rules = [
    { mime = "image/*", fg = "#a0cfd4" },
    { mime = "{audio,video}/*", fg = "#a0cfd4" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#ffb4ab" },
    { mime = "application/{pdf,doc,rtf}", fg = "#a2d399" },
    { url = "*/", fg = "#a0cfd4", bold = true },
    { url = "*", fg = "#e0e4da" },
]
